<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600mm" height="200mm">
  <defs>
    <style>
      @font-face {
        font-family: 'sign-font';
        src: local('Arial Black'), local('Impact'), local('Helvetica Neue');
      }
    </style>
  </defs>

  <!-- Outer border shape - elongated hexagon -->
  <polygon
    points="50,100 90,20 510,20 550,100 510,180 90,180"
    fill="none"
    stroke="black"
    stroke-width="2"
    id="outer-border"
  />

  <!-- Inner border shape - slightly smaller hexagon -->
  <polygon
    points="62,100 98,28 502,28 538,100 502,172 98,172"
    fill="none"
    stroke="black"
    stroke-width="1.5"
    id="inner-border"
  />

  <!-- Decorative lines above subtitle text -->
  <line x1="175" y1="58" x2="245" y2="58" stroke="black" stroke-width="1.2" />
  <line x1="355" y1="58" x2="425" y2="58" stroke="black" stroke-width="1.2" />

  <!-- Small decorative diamonds on left and right -->
  <polygon points="108,100 115,93 122,100 115,107" fill="black" stroke="none" id="diamond-left" />
  <polygon points="478,100 485,93 492,100 485,107" fill="black" stroke="none" id="diamond-right" />

  <!-- Subtitle: TOMORROWLAND TRANSIT AUTHORITY -->
  <text
    x="300" y="72"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="normal"
    letter-spacing="3"
    fill="black"
    id="subtitle-text"
  >TOMORROWLAND TRANSIT AUTHORITY</text>

  <!-- Main text: PEOPLEMOVER -->
  <text
    x="300" y="128"
    text-anchor="middle"
    font-family="Arial Black, Impact, Helvetica Neue, sans-serif"
    font-size="56"
    font-weight="900"
    letter-spacing="2"
    fill="black"
    id="main-text"
  >PEOPLEMOVER</text>

  <!-- Decorative line below main text -->
  <line x1="140" y1="145" x2="460" y2="145" stroke="black" stroke-width="0.8" />

</svg>
